services:
  - type: web
    name: stocksense-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --keep-alive 5 --preload
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_EMAIL_SENDER
        sync: false
      - key: ALERT_EMAIL_RECIPIENTS
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
